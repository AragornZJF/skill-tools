  <text x="300" y="745" text-anchor="middle" font-size="16" fill="#141414" letter-spacing="3">达标即停，不用盯</text>

  <rect x="16" y="16" width="568" height="768" fill="none" stroke="#141414" stroke-width="1.2" opacity=".2"/>
