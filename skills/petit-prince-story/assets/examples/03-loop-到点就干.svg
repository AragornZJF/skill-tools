  <line x1="260" y1="715" x2="340" y2="715" stroke="#141414" stroke-width="1.4"/>
  <text x="300" y="745" text-anchor="middle" font-size="16" fill="#141414" letter-spacing="3">到点就干，周而复始</text>

  <rect x="16" y="16" width="568" height="768" fill="none" stroke="#141414" stroke-width="1.2" opacity=".2"/>
