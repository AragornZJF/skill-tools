<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="./shared/styles.css">
</head>
<body class="page-body">
  <header class="status-bar">
    <span class="status-time">9:41</span>
    <span class="status-icons">
      <i class="fa-solid fa-signal"></i>
      <i class="fa-solid fa-wifi"></i>
      <i class="fa-solid fa-battery-full"></i>
    </span>
  </header>

  <main class="page-content px-5 pb-6">
    <div class="flex items-center justify-between pt-3 pb-4">
      <div>
        <p class="text-xs" style="color:#86868b;">早上好</p>
        <h1 class="text-xl font-bold" style="color:#1d1d1f;">今天也要加油</h1>
      </div>
      <img class="avatar-sm" src="https://ui-avatars.com/api/?name=User&background=007aff&color=fff" alt="头像">
    </div>

    <!-- 主题 Banner，替换为主题相关真实图片 -->
    <div class="banner-card ripple-btn">
      <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=600&q=80" alt="banner">
      <div class="banner-overlay">
        <h2 class="text-lg font-bold text-white">精选内容</h2>
        <p class="text-xs text-white/80">点击查看更多</p>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mt-4">
      <div class="glass-card stat-card ripple-btn">
        <i class="fa-solid fa-fire stat-icon"></i>
        <p class="stat-num">328</p>
        <p class="stat-label">今日数据</p>
      </div>
      <div class="glass-card stat-card ripple-btn">
        <i class="fa-solid fa-chart-line stat-icon"></i>
        <p class="stat-num">85%</p>
        <p class="stat-label">完成度</p>
      </div>
    </div>

    <h3 class="section-title">推荐列表</h3>
    <div class="space-y-3">
      <div class="list-card ripple-btn">
        <img class="list-thumb" src="https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=200&q=80" alt="item">
        <div class="flex-1">
          <p class="font-semibold text-sm" style="color:#1d1d1f;">条目标题</p>
          <p class="text-xs" style="color:#86868b;">辅助描述信息</p>
        </div>
        <i class="fa-solid fa-chevron-right" style="color:#c7c7cc;"></i>
      </div>
      <div class="list-card ripple-btn">
        <img class="list-thumb" src="https://images.unsplash.com/photo-1538805060514-97d9cc17730c?w=200&q=80" alt="item">
        <div class="flex-1">
          <p class="font-semibold text-sm" style="color:#1d1d1f;">条目标题</p>
          <p class="text-xs" style="color:#86868b;">辅助描述信息</p>
        </div>
        <i class="fa-solid fa-chevron-right" style="color:#c7c7cc;"></i>
      </div>
    </div>
  </main>

  <script src="./shared/app.js"></script>
  <script>
    enableRipple();
  </script>
</body>
</html>
