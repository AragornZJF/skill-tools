<?xml version="1.0" encoding="UTF-8"?>
<!-- demo: watercolor 单幕（狐狸章）—— 验证 style=watercolor 路径。
     与 line 版同一套几何，只按 characters.md 调色板加 fill、换描边色。 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" font-family="'Ma Shan Zheng','Noto Serif SC',Georgia,serif">
