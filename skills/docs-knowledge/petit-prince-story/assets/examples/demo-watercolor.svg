  <line x1="260" y1="715" x2="340" y2="715" stroke="#9c7e44" stroke-width="1.4"/>
  <text x="300" y="745" text-anchor="middle" font-size="16" fill="#6b5836" letter-spacing="3">用心去看 · 才看得清楚</text>

  <rect x="16" y="16" width="568" height="768" fill="none" stroke="#9c7e44" stroke-width="1.2" opacity=".3"/>
