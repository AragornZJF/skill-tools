  </g>
  <circle cx="510" cy="410" r="16" fill="#cfe0d6" stroke="#6f8f78" stroke-width="1.2" opacity=".8"/>
  <circle cx="90" cy="470" r="9" fill="#e0d4b8" stroke="#b08a4a" stroke-width="1" opacity=".7"/>

